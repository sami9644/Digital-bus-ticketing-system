<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay for Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Small tweak to ensure the card doesn't hug the top on mobile */
        body { background-color: #f8f9fa; padding-top: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-4">Complete Payment</h5>
                    <h5 class="card-title mb-4">{{ price }}</h5>
                    
                    <form action="/pay/{{ticketid}}" method="post">
                        <div class="mb-3">
                            <label for="totalpersons" class="form-label">How many people?</label>
                            <input type="number" 
                                   class="form-control" 
                                   id="totalpersons" 
                                   name="totalpersons" 
                                   placeholder="e.g. 1" 
                                   required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Pay Now</button>
                            <a href="/dashboard" class="btn btn-outline-secondary">Back to Dashboard</a>
                        </div>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
