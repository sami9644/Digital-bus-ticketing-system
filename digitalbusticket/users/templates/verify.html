<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="row w-100 justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            
            <div class="card border-0 shadow-sm text-center p-4">
                <div class="card-body">
                    
                    {% if "Successfully" in message or "verified" in message.lower() %}
                        <div class="display-1 text-success mb-3">
                            <i class="bi bi-check-circle-fill"></i>
                        </div>
                        <h2 class="h4 fw-bold text-dark">Payment Confirmed</h2>
                    {% else %}
                        <div class="display-1 text-danger mb-3">
                            <i class="bi bi-exclamation-octagon-fill"></i>
                        </div>
                        <h2 class="h4 fw-bold text-dark">Status Update</h2>
                    {% endif %}

                    <p class="text-muted mt-2 mb-4">
                        {{ message }}
                    </p>

                    <hr class="my-4 opacity-25">

                    <div class="d-grid">
                        <a href="/dashboard" class="btn btn-primary btn-lg shadow-sm">
                            <i class="bi bi-house-door me-2"></i>Go to Dashboard
                        </a>
                    </div>

                </div>
            </div>
            
            <p class="text-center text-muted small mt-4">
                Powered by Chapa Secure Payments
            </p>

        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</body>
</html>
