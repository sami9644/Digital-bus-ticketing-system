<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify ticket</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { background-color: #f8f9fa; min-height: 100vh; }
        /* Ensures the scanner looks good on all screens */
        #reader { 
            width: 100% !important; 
            border: none !important; 
        }
        #reader__dashboard { padding: 10px !important; }
        .scanner-card { overflow: hidden; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function QRScanner() {
            const [scanResult, setScanResult] = useState(null);

            useEffect(() => {
                const scanner = new Html5QrcodeScanner("reader", {
                    fps: 10,
                    qrbox: { width: 250, height: 250 },
                    // Important for mobile: aspect ratio of the camera view
                    aspectRatio: 1.0 
                });

                const onSuccess = (decodedText) => {
                    setScanResult(decodedText);
                };

                const onError = (err) => {
                    // console.warn(err); 
                };

                scanner.render(onSuccess, onError);

                return () => {
                    scanner.clear().catch(error => console.error("Failed to clear scanner", error));
                };
            }, []);

            return (
                <div className="container-fluid py-4">
                    <div className="row justify-content-center">
                        <div className="col-12 col-md-6 col-lg-4">
                            
                            {/* Back Button */}
                            <div className="mb-3">
                                <a href="/dashboard" className="btn btn-outline-secondary btn-sm border-0">
                                    <i className="bi bi-chevron-left"></i> Back to Dashboard
                                </a>
                            </div>

                            {/* Main Scanner Card */}
                            <div className="card shadow-sm scanner-card">
                                <div className="card-header bg-white py-3">
                                    <h5 className="card-title mb-0 text-center">Scan QR to Pay</h5>
                                </div>
                                <div className="card-body p-0">
                                    <div id="reader"></div>
                                </div>
                                
                                {scanResult && (
                                    <div className="card-footer bg-light p-3 animate__animated animate__fadeIn">
                                        <div className="alert alert-success mb-0">
                                            <h6 className="alert-heading">Success!</h6>
                                            <p className="small text-break">{scanResult}</p>
                                            <hr />
                                            <div className="d-grid">
                                                <a href={scanResult} target="_blank" className="btn btn-success">
                                                    <i className="bi bi-credit-card me-2"></i>Proceed to Payment
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <p className="text-muted text-center mt-4 small">
                                Center the QR code within the frame to scan.
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<QRScanner />);
    </script>
</body>
</html>
