<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .transaction-card { transition: transform 0.2s; border: none; }
        .transaction-card:hover { transform: translateY(-3px); }
        .back-btn { text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; }
    </style>
</head>
<body>

<div class="container py-4">
    <header class="mb-4">
        <a href="/dashboard" class="btn btn-outline-primary btn-sm back-btn mb-3">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
        <div class="d-flex justify-content-between align-items-center border-bottom pb-2">
            <h1 class="h3 fw-bold text-dark mb-0">Payment History</h1>
            <span class="badge rounded-pill bg-primary">{{ payments|length }} Records</span>
        </div>
    </header>

    <div class="row g-3">
        {% for payment in payments %}
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm transaction-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="text-muted small">#{{ payment[0] }}</span>
                        <span class="h5 mb-0 text-success fw-bold">${{ payment[1] }}</span>
                    </div>
                    
                    <h6 class="card-subtitle mb-3 text-secondary">
                        <i class="bi bi-people-fill me-1"></i>
                        {{ payment[2] }} {{ 'person' if payment[2] == 1 else 'persons' }}
                    </h6>
                    
                    <div class="bg-light p-2 rounded">
                        <small class="text-uppercase fw-bold text-muted d-block" style="font-size: 0.7rem;">Service Address</small>
                        <p class="card-text small mb-0 text-dark">
                            {{ tic(payment[4])[3] }}
                        </p>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12 text-center py-5">
            <i class="bi bi-credit-card-2-back text-muted" style="font-size: 3rem;"></i>
            <p class="mt-3 text-muted">No transaction history found.</p>
        </div>
        {% endfor %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
